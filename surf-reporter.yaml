apiVersion: apps/v1
kind: Deployment
metadata:
  name: noaa-exporter
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: noaa-exporter
  template:
    metadata:
      labels:
        app: noaa-exporter
    spec:
      containers:
        - name: noaa-exporter
          image: cascade1080/noaa-exporter:latest
          ports:
            - containerPort: 8000

---
apiVersion: v1
kind: Service
metadata:
  name: noaa-exporter
  namespace: monitoring
spec:
  selector:
    app: noaa-exporter
  ports:
    - port: 8000
      targetPort: 8000

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: noaa-exporter-ingress
  namespace: monitoring
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
    - host: noaa-exporter.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: noaa-exporter
                port:
                  number: 8000

