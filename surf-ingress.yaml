apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: noaa-exporter-ingress
  namespace: monitoring
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
    - host: noaa-exporter.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: noaa-exporter
                port:
                  number: 8000
